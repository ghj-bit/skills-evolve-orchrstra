# LiteLLM proxy config for two OpenAI-compatible worker endpoints.
#
# Start:
#   litellm --config configs/litellm.example.yaml --host 0.0.0.0 --port 9000
#
# Then set:
#   API_BASE=http://localhost:9000/v1
#   API_KEY=empty

model_list:
  - model_name: qwen3-8B
    litellm_params:
      model: openai/qwen3-8B
      api_base: https://notebook-inspire.sii.edu.cn/ws-9dcc0e1f-80a4-4af2-bc2f-0e352e7b17e6/project-b795c114-135a-40db-b3d0-19b60f25237b/user-543feed4-0be2-4972-8987-a324af06c93f/vscode/4a7c22e1-2ea5-4c8a-8f1e-7c47a4734b85/2f12fb9f-3470-409b-9f00-47ccc9d50aeb/proxy/8042/v1
      api_key: empty

  - model_name: deepseek
